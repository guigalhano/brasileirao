name: Atualizar dados do Cartola FC

# Roda automaticamente a cada 3 dias, e tambem pode ser disparado manualmente
# na aba "Actions" do GitHub (botao "Run workflow").
on:
  schedule:
    - cron: "0 6 */3 * *"   # 06:00 UTC, a cada 3 dias
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Buscar mercado atual do Cartola FC e enriquecer com o historico
        run: python scripts/atualizar_mercado_cartola.py

      - name: Regenerar index.html com os dados atualizados
        run: python scripts/build_index.py

      - name: Commit e push se algo mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          if git diff --cached --quiet; then
            echo "Nada mudou desde a ultima atualizacao, nao commitando."
          else
            git commit -m "Atualizacao automatica dos dados do Cartola FC ($(date -u +%Y-%m-%d))"
            git push
          fi
